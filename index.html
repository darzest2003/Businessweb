<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zest & Zafier</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>
  <div class="menu-icon" onclick="openMenu()">☰</div>
  <div class="logo">Zest & Zafier</div>
  <div class="cart-btn" onclick="openCart()">
    🛒 Cart (<span id="cartCount">0</span>)
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Luxury Fragrances</h1>
  <p>Discover premium perfumes crafted for elegance.</p>
</section>

<!-- SEARCH -->
<div class="search-container">
  <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="Search perfume...">
</div>

<!-- PRODUCTS -->
<section class="products" id="productContainer"></section>

<!-- CART SIDEBAR -->
<div id="cartSidebar" class="cart-sidebar">
  <div class="cart-header">
    <h2>Your Cart</h2>
    <span onclick="closeCart()" style="cursor:pointer;font-size:24px;">×</span>
  </div>

  <div id="cartItems"></div>

  <div class="cart-footer">
    <h3>Total: $<span id="cartTotal">0</span></h3>
    <button onclick="openCheckoutLoader()">Checkout</button>
  </div>
</div>

<!-- LOADER -->
<div id="loaderPopup" class="popup">
  <div class="loader"></div>
  <p>Preparing Checkout...</p>
</div>

<!-- CHECKOUT -->
<div id="checkoutForm" class="popup">
  <div class="form-box">
    <h2>Customer Details</h2>

    <input id="name" type="text" placeholder="Full Name">
    <input id="phone" type="text" placeholder="Phone">
    <textarea id="address" placeholder="Address"></textarea>

    <select>
      <option>Cash On Delivery</option>
      <option>EasyPaisa</option>
      <option>JazzCash</option>
    </select>

    <button class="submit-btn" onclick="submitOrder()">Place Order</button>
  </div>
</div>

<!-- SUCCESS -->
<div id="successPopup" class="success-popup">
  <div class="success-box">
    <h2>🎉 Order Placed!</h2>
    <button onclick="closeSuccess()">Continue</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
