<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zest & Zafier</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<header class="nav">
  <div class="logo">Zest & Zafier</div>

  <div class="nav-right">
    <button class="cart-icon" onclick="openCart()">
      🛒 <span id="cartCount">0</span>
    </button>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Luxury Fragrances</h1>
    <p>Crafted for elegance, confidence & identity</p>
  </div>
</section>

<!-- SEARCH -->
<div class="search">
  <input id="searchInput" onkeyup="searchProducts()" placeholder="Search perfumes...">
</div>

<!-- PRODUCTS -->
<section class="grid" id="productContainer"></section>

<!-- CART DRAWER -->
<div id="cartDrawer" class="cart-drawer">

  <div class="cart-header">
    <h2>Your Cart</h2>
    <span onclick="closeCart()">✕</span>
  </div>

  <div id="cartItems"></div>

  <div class="cart-footer">
    <h3>Total: $<span id="cartTotal">0</span></h3>
    <button onclick="openCheckout()">Checkout</button>
  </div>
</div>

<!-- CHECKOUT -->
<div id="checkoutModal" class="modal">
  <div class="modal-box">

    <h2>Checkout</h2>

    <input id="name" placeholder="Full Name">
    <input id="phone" placeholder="Phone">
    <textarea id="address" placeholder="Address"></textarea>

    <button onclick="placeOrder()">Place Order</button>

  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script src="script.js"></script>
</body>
</html>
